<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Game Recommendations - Netflix Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background-color: #141414;
            color: #e5e5e5;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 메인 컨테이너 */
        .results-container {
            width: 100%;
            max-width: 1200px;
        }

        /* 상단 헤더 영역 */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            border-bottom: 2px solid #2f2f2f;
            padding-bottom: 20px;
        }

        .results-header h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .back-btn {
            padding: 10px 20px;
            background-color: #E50914;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: #B20710;
        }

        /* 추천 섹션 타이틀 */
        .section-title {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #E50914;
        }

        /* 카테고리별 수평 스크롤 캐러셀 로우 레이아웃 */
        .game-row {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 20px;
            margin-bottom: 50px;
            padding: 10px 0;
        }

        /* 개별 게임 카드 스타일 */
        .game-card {
            background-color: #181818;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            width: 280px;
            flex: 0 0 auto;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            z-index: 10;
        }

        /* 게임 커버 이미지 (스팀 캡슐 비율 유지하되 호버 시 확장 고려) */
        .game-cover {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        /* 게임 정보 영역 (카드 내부) */
        .game-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 매치율 및 스토어 링크 */
        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-top: auto;
        }

        .match-percent {
            color: #46d369;
            font-weight: bold;
        }

        .store-link {
            color: #e50914;
            text-decoration: none;
            font-weight: bold;
        }

        .store-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="results-container">
        
        <header class="results-header">
            <h1>AI 맞춤 추천 게임</h1>
            <a href="dashboard.html" class="back-btn">⇠ 통계 다시보기</a>
        </header>

        <!-- 로딩 -->
        <div id="loadingArea" style="text-align:center; padding:60px 0; color:#b3b3b3;">
            <div style="width:40px;height:40px;border:4px solid #333;border-top-color:#E50914;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
            추천 결과를 불러오는 중입니다...
        </div>

        <div id="contentArea" style="display:none;">
            <section>
                <h2 class="section-title">🎮 장르 기반 추천</h2>
                <div class="game-row" id="genreBasedRow"></div>
            </section>

            <section>
                <h2 class="section-title">👥 유사 유저 기반 추천</h2>
                <div class="game-row" id="collaborativeRow"></div>
            </section>

            <section>
                <h2 class="section-title">💎 숨겨진 명작</h2>
                <div class="game-row" id="hiddenRow"></div>
            </section>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        const API_BASE = 'http://gamefinder-alb-44501543.ap-northeast-2.elb.amazonaws.com';
        const steamId = sessionStorage.getItem('steam_id') || '76561198000000001';

        function renderRow(games, rowId) {
            const row = document.getElementById(rowId);
            if (!games || games.length === 0) {
                row.innerHTML = '<p style="color:#b3b3b3;padding:20px 0;">추천 결과가 없습니다.</p>';
                return;
            }
            row.innerHTML = games.map(g => `
                <div class="game-card" onclick="window.open('${g.store_url || '#'}', '_blank')">
                    <img src="${g.header_image}" alt="${g.name}" class="game-cover"
                         onerror="this.src='https://via.placeholder.com/280x150/181818/555?text=No+Image'">
                    <div class="game-info">
                        <p class="game-title">${g.name}</p>
                        <div class="game-meta">
                            <span class="match-percent">${g.match_percent || 0}% 일치</span>
                            <span class="store-link">스토어 이동 ➔</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadRecommendations() {
            try {
                const res = await fetch(`${API_BASE}/api/recommend/${steamId}`);
                const data = await res.json();
                renderRow(data.genre_based,  'genreBasedRow');
                renderRow(data.collab_based, 'collaborativeRow');
                renderRow(data.hidden_gems,  'hiddenRow');
                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('contentArea').style.display = 'block';
            } catch (e) {
                document.getElementById('loadingArea').innerHTML = `<p style="color:#E50914">오류: ${e.message}</p>`;
            }
        }

        loadRecommendations();
    </script>
</body>
</html>
