<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stats - Netflix Style</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #141414;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
        }

        /* 프로필 헤더 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #181818;
            padding: 25px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 4px; 
            border: 2px solid #E50914;
        }

        .profile-info h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: #b3b3b3;
            font-size: 1rem;
        }

        /* 차트 그리드 */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .chart-card {
            background-color: #181818;
            padding: 25px;
            border-radius: 8px;
        }

        .chart-card h3 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
        }

        .action-section {
            text-align: center;
        }

        .recommend-btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            border: none;
            background-color: #E50914;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }

        .recommend-btn:hover {
            background-color: #b20710;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="profile-header">
            <img src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg" alt="Profile" class="profile-avatar">
            <div class="profile-info">
                <h2>kiger 님의 시청... 아니, 플레이 기록</h2>
                <p>총 플레이 타임: 1,420 시간 • 보유 게임: 128개</p>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-card">
                <h3>선호하는 장르</h3>
                <canvas id="genreChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>가장 많이 플레이한 콘텐츠</h3>
                <canvas id="playtimeChart"></canvas>
            </div>
        </div>

        <div class="action-section">
            <button class="recommend-btn" id="goRecommendBtn">맞춤 추천작 보기 ➔</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://gamefinder-alb-44501543.ap-northeast-2.elb.amazonaws.com';
        const steamId = sessionStorage.getItem('steam_id') || '76561198000000001';
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');

        Chart.defaults.color = '#b3b3b3';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.1)';

        let genreChartInstance = null;
        let playtimeChartInstance = null;

        async function loadDashboard() {
            // 프로필 정보
            if (user.username) {
                document.querySelector('.profile-info h2').textContent = `${user.username} 님의 플레이 기록`;
                document.querySelector('.profile-avatar').src = user.avatar_url || '';
            }

            try {
                const res = await fetch(`${API_BASE}/api/stats/${steamId}`);
                const stats = await res.json();

                document.querySelector('.profile-info p').textContent =
                    `총 플레이 타임: ${stats.total_playtime_hours.toLocaleString()} 시간 • 보유 게임: ${stats.total_games}개`;

                // 장르 도넛 차트
                const genres = Object.entries(stats.genre_distribution).slice(0, 5);
                const colors = ['#E50914', '#B20710', '#831010', '#4A4A4A', '#2B2B2B'];
                if (genreChartInstance) genreChartInstance.destroy();
                genreChartInstance = new Chart(document.getElementById('genreChart').getContext('2d'), {
                    type: 'doughnut',
                    data: {
                        labels: genres.map(([g]) => g),
                        datasets: [{ data: genres.map(([, v]) => v.percentage), backgroundColor: colors, borderWidth: 0 }]
                    },
                    options: { plugins: { legend: { position: 'bottom' } } }
                });

                // Top5 가로 막대 차트
                const top5 = stats.top5_games;
                if (playtimeChartInstance) playtimeChartInstance.destroy();
                playtimeChartInstance = new Chart(document.getElementById('playtimeChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: top5.map(g => g.name),
                        datasets: [{ label: '플레이 시간(h)', data: top5.map(g => g.playtime_hours), backgroundColor: '#E50914', borderRadius: 4 }]
                    },
                    options: {
                        indexAxis: 'y',
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: 'rgba(255,255,255,0.05)' } },
                            y: { grid: { display: false } }
                        }
                    }
                });
            } catch (e) {
                console.error('통계 로드 실패:', e);
            }
        }

        document.getElementById('goRecommendBtn').addEventListener('click', function() {
            window.location.href = 'recommendations.html';
        });

        loadDashboard();
    </script>
</body>
</html>
