<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Finder - 맞춤 추천</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }

        body { background-color: #141414; color: #ffffff; padding: 40px 20px; }

        .container { max-width: 1100px; margin: 0 auto; }

        /* 헤더 */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; color: #E50914; font-weight: 900; letter-spacing: 1px; }
        .back-btn { padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .back-btn:hover { background: #555; }

        /* 로딩 */
        .loading { text-align: center; padding: 80px 0; color: #b3b3b3; font-size: 1.1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #E50914; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 섹션 */
        .section { margin-bottom: 50px; }
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .section-desc { font-size: 0.9rem; color: #b3b3b3; margin-bottom: 20px; }

        /* 게임 카드 그리드 */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }

        .game-card {
            background: #181818;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }

        .game-card img { width: 100%; aspect-ratio: 460/215; object-fit: cover; display: block; }

        .card-body { padding: 12px; }
        .card-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-genres { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .genre-tag { font-size: 0.7rem; padding: 2px 7px; border-radius: 12px; background: #2a2a2a; color: #b3b3b3; }

        .match-bar-wrap { display: flex; align-items: center; gap: 8px; }
        .match-bar { flex: 1; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
        .match-bar-fill { height: 100%; background: #E50914; border-radius: 2px; }
        .match-pct { font-size: 0.8rem; color: #E50914; font-weight: 700; white-space: nowrap; }

        /* 빈 결과 */
        .empty { color: #b3b3b3; font-size: 0.95rem; padding: 20px 0; }

        @media (max-width: 600px) {
            .game-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Game Finder</h1>
            <button class="back-btn" onclick="window.location.href='dashboard.html'">← 대시보드</button>
        </div>

        <div id="loadingArea" class="loading">
            <div class="spinner"></div>
            추천 결과를 불러오는 중입니다...
        </div>

        <div id="contentArea" style="display:none;">
            <!-- 장르 기반 추천 -->
            <div class="section">
                <div class="section-title">🎮 장르 기반 추천</div>
                <div class="section-desc">내가 많이 플레이한 장르와 비슷한 게임</div>
                <div class="game-grid" id="genreGrid"></div>
            </div>

            <!-- 협업 필터링 추천 -->
            <div class="section">
                <div class="section-title">👥 유사 유저 기반 추천</div>
                <div class="section-desc">나와 플레이 패턴이 비슷한 유저들이 즐긴 게임</div>
                <div class="game-grid" id="collabGrid"></div>
            </div>

            <!-- 숨겨진 명작 -->
            <div class="section">
                <div class="section-title">💎 숨겨진 명작</div>
                <div class="section-desc">높은 평점이지만 아직 내 라이브러리에 없는 게임</div>
                <div class="game-grid" id="hiddenGrid"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://3.34.197.82:5000';
        const steamId = sessionStorage.getItem('steam_id') || '76561198000000001';

        function renderCards(games, containerId) {
            const container = document.getElementById(containerId);
            if (!games || games.length === 0) {
                container.innerHTML = '<p class="empty">추천 결과가 없습니다.</p>';
                return;
            }
            container.innerHTML = games.map(g => `
                <a class="game-card" href="${g.store_url || '#'}" target="_blank" rel="noopener">
                    <img src="${g.header_image}" alt="${g.name}" loading="lazy"
                         onerror="this.src='https://via.placeholder.com/460x215/181818/555?text=No+Image'">
                    <div class="card-body">
                        <div class="card-title">${g.name}</div>
                        <div class="card-genres">
                            ${(g.genres || []).slice(0, 3).map(genre => `<span class="genre-tag">${genre}</span>`).join('')}
                        </div>
                        <div class="match-bar-wrap">
                            <div class="match-bar">
                                <div class="match-bar-fill" style="width:${g.match_percent || 0}%"></div>
                            </div>
                            <span class="match-pct">${g.match_percent || 0}%</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        async function loadRecommendations() {
            try {
                const res = await fetch(`${API_BASE}/api/recommend/${steamId}`);
                const data = await res.json();

                renderCards(data.genre_based,  'genreGrid');
                renderCards(data.collab_based, 'collabGrid');
                renderCards(data.hidden_gems,  'hiddenGrid');

                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('contentArea').style.display = 'block';
            } catch (e) {
                document.getElementById('loadingArea').innerHTML = `<p style="color:#E50914">오류: ${e.message}</p>`;
            }
        }

        loadRecommendations();
    </script>
</body>
</html>
