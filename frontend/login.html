<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Finder - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, sans-serif;
        }

        body {
            background-color: #141414;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background-color: rgba(0, 0, 0, 0.75);
            border-radius: 8px;
        }

        /* 메인 로고 타이틀 */
        .site-title {
            color: #E50914;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .site-description {
            font-size: 1rem;
            color: #b3b3b3;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        /* 입력창 디자인 */
        .input-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            margin-bottom: 25px;
        }

        #steamIdInput {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            background-color: #333333;
            color: #ffffff;
            outline: none;
            transition: background-color 0.2s;
        }

        #steamIdInput:focus {
            background-color: #454545;
        }

        /* 분석 시작 버튼 */
        #analyzeBtn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            border: none;
            background-color: #E50914;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #analyzeBtn:hover {
            background-color: #c90812;
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            width: 100%;
            color: #737373;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #333;
        }

        .divider span {
            padding: 0 15px;
        }

        /* 스팀 로그인 버튼 */
        .steam-btn-wrapper {
            cursor: pointer;
            transition: opacity 0.2s;
            opacity: 0.9;
        }

        .steam-btn-wrapper:hover {
            opacity: 1;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #737373;
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h1 class="site-title">Game Finder</h1>
        <p class="site-description">당신의 플레이 기록을 분석하여<br>최고의 게임을 추천합니다.</p>
        
        <div class="input-wrapper">
            <input type="text" id="steamIdInput" placeholder="스팀 ID 또는 URL 입력">
            <button id="analyzeBtn">시작하기</button>
        </div>

        <div class="divider">
            <span>또는</span>
        </div>

        <div class="steam-btn-wrapper" id="steamLoginBtn">
            <img src="https://steamcommunity-a.akamaihd.net/public/images/signinthroughsteam/sits_02.png" alt="Sign in through Steam">
        </div>
    </div>

    <div class="footer">
        Powered by Steam. Not affiliated with Valve Corporation.
    </div>

    <script>
        const API_BASE = 'http://gamefinder-alb-44501543.ap-northeast-2.elb.amazonaws.com';

        document.getElementById('analyzeBtn').addEventListener('click', async function() {
            const steamId = document.getElementById('steamIdInput').value.trim();
            if (!steamId) return alert('스팀 ID를 입력해주세요!');

            const btn = document.getElementById('analyzeBtn');
            btn.textContent = '분석 중...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/user/${steamId}`);
                if (!res.ok) throw new Error('유저를 찾을 수 없습니다.');
                const user = await res.json();
                sessionStorage.setItem('steam_id', user.steam_id);
                sessionStorage.setItem('user', JSON.stringify(user));
                window.location.href = `dashboard.html`;
            } catch (e) {
                alert(e.message);
                btn.textContent = '시작하기';
                btn.disabled = false;
            }
        });

        document.getElementById('steamIdInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('analyzeBtn').click();
        });

        document.getElementById('steamLoginBtn').addEventListener('click', function() {
            alert("Steam API Key 연동 후 사용 가능합니다.");
        });
    </script>
</body>
</html>
